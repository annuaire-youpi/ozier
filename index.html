<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil Créateur – Annuaire YOUPI</title>

  <style>
    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #6366f1;
      --primary-dark:  #4f46e5;
      --primary-light: #e0e7ff;
      --orange:        #f97316;
      --yellow:        #fbbf24;
      --bg:            #f3f4f6;
      --card:          #ffffff;
      --text:          #111827;
      --muted:         #6b7280;
      --border:        #e5e7eb;
      --success:       #10b981;
      --warning:       #f59e0b;
      --radius:        14px;
      --shadow:        0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* =============================================
       HEADER
    ============================================= */
    header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      color: #fff;
      padding: 0 24px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(79,70,229,.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--orange), var(--yellow));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 22px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(249,115,22,.4);
    }

    .header-titles h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .3px;
    }

    .header-titles span {
      font-size: 12px;
      opacity: .8;
      font-weight: 400;
    }

    .btn-create {
      background: linear-gradient(135deg, var(--orange), var(--yellow));
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(249,115,22,.35);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-create:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(249,115,22,.45); }

    /* =============================================
       LAYOUT
    ============================================= */
    .page-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 48px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .page-wrapper { grid-template-columns: 1fr; }
    }

    /* =============================================
       CARTES GÉNÉRIQUES
    ============================================= */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* =============================================
       PROFIL + PROGRESSION
    ============================================= */
    .profile-card {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(99,102,241,.35);
    }

    .profile-info { flex: 1; min-width: 200px; }

    .profile-name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .level-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 50px;
      margin-bottom: 12px;
    }

    .progress-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      transition: width .6s ease;
    }

    /* Compteurs */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .stat-box {
      flex: 1;
      min-width: 90px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.3;
    }

    /* =============================================
       GRILLE BADGES
    ============================================= */
    .badges-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    .badge-item {
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      border: 1.5px solid transparent;
      transition: transform .15s;
    }
    .badge-item:hover { transform: translateY(-2px); }

    .badge-item.unlocked {
      background: linear-gradient(135deg, #fff7ed, #fffbeb);
      border-color: var(--orange);
    }

    .badge-item.locked {
      background: #f9fafb;
      border-color: #e5e7eb;
      opacity: .65;
      filter: grayscale(1);
    }

    .badge-icon {
      font-size: 30px;
      margin-bottom: 6px;
      display: block;
    }

    .badge-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .badge-desc {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.4;
    }

    .badge-lock {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 5px;
      font-style: italic;
    }

    /* =============================================
       MISSIONS
    ============================================= */
    .missions-list { display: flex; flex-direction: column; gap: 14px; }

    .mission-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: #fff;
      transition: box-shadow .15s;
    }
    .mission-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,.07); }

    .mission-status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-todo    { background: #d1d5db; }
    .status-ongoing { background: var(--warning); }
    .status-done    { background: var(--success); }

    .mission-content { flex: 1; }

    .mission-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .mission-desc {
      font-size: 12px;
      color: var(--muted);
    }

    .mission-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .mission-pts {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
    }

    .mission-status-label {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 50px;
    }
    .label-todo    { background: #f3f4f6; color: #6b7280; }
    .label-ongoing { background: #fef3c7; color: #92400e; }
    .label-done    { background: #d1fae5; color: #065f46; }

    .btn-launch {
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      background: var(--primary-light);
      border: none;
      padding: 6px 12px;
      border-radius: 50px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-launch:hover { background: #c7d2fe; }

    /* =============================================
       PANNEAU LATÉRAL
    ============================================= */
    .sidebar { display: flex; flex-direction: column; gap: 20px; }

    .why-box { }

    .why-box p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .why-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .why-icon {
      font-size: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .why-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .why-text strong { color: var(--text); display: block; font-size: 13px; }

    /* Prochaines étapes */
    .next-steps-list { display: flex; flex-direction: column; gap: 10px; }

    .next-step {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
    }
    .next-step:hover { background: var(--primary-light); border-color: var(--primary); }

    .next-step-icon { font-size: 18px; }

    .next-step-text { flex: 1; font-size: 12px; font-weight: 600; }

    .next-step-pts {
      font-size: 11px;
      color: var(--primary);
      font-weight: 700;
      background: var(--primary-light);
      padding: 2px 7px;
      border-radius: 50px;
    }

    /* =============================================
       TOAST NOTIFICATION
    ============================================= */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--primary-dark);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(79,70,229,.4);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .3s, transform .3s;
      z-index: 9999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* =============================================
       SECTION TITRES
    ============================================= */
    .section { margin-bottom: 0; }
    .main-col { display: flex; flex-direction: column; gap: 24px; }

    /* divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0 16px;
    }
  </style>
</head>
<body>

<!-- ====== TOAST ====== -->
<div class="toast" id="toast"></div>

<!-- ====== HEADER ====== -->
<header>
  <div class="header-brand">
    <div class="logo-box">Y</div>
    <div class="header-titles">
      <h1>Annuaire YOUPI</h1>
      <span>Profil créateur</span>
    </div>
  </div>
  <button class="btn-create" onclick="showToast('✨ Redirigé vers la création de page YOUPI !')">
    ＋ Créer une nouvelle page
  </button>
</header>

<!-- ====== CONTENU PRINCIPAL ====== -->
<div class="page-wrapper">

  <!-- Colonne principale -->
  <main class="main-col" id="main-col"></main>

  <!-- Panneau latéral -->
  <aside class="sidebar" id="sidebar"></aside>

</div>

<script>
/* ==============================================
   OBJET DE DONNÉES DE DÉMONSTRATION
   Modifier uniquement ce bloc pour changer l'affichage.
============================================== */
const DATA = {

  /* -- Client -- */
  client: {
    nom:      "Boulangerie Soleil",
    initiales:"BS",
  },

  /* -- Niveaux -- */
  niveaux: [
    { numero: 1, nom: "Découvreur",       ptMin: 0   },
    { numero: 2, nom: "Contributeur Actif", ptMin: 60  },
    { numero: 3, nom: "Ambassadeur Local", ptMin: 200 },
    { numero: 4, nom: "Expert Visibilité", ptMin: 400 },
  ],
  pointsActuels: 120,

  /* -- Statistiques clés -- */
  stats: {
    pagesCreees:    8,
    mAJCeMois:      4,
    badgesObtenus:  4,
  },

  /* -- Badges (obtenu: true/false) -- */
  badges: [
    {
      id: "premiere-vitrine",
      icon: "🏪",
      nom: "Première vitrine",
      desc: "1ère page publiée dans l'annuaire",
      obtenu: true,
    },
    {
      id: "semaine-productive",
      icon: "🚀",
      nom: "Semaine productive",
      desc: "3 pages créées en une seule semaine",
      obtenu: true,
    },
    {
      id: "page-optimisee",
      icon: "⭐",
      nom: "Page optimisée",
      desc: "Tous les champs d'une page remplis à 100 %",
      obtenu: true,
    },
    {
      id: "page-ia",
      icon: "🤖",
      nom: "Page IA",
      desc: "Contenu rédigé avec l'IA YOUPI",
      obtenu: true,
    },
    {
      id: "editeur-regulier",
      icon: "📅",
      nom: "Éditeur régulier",
      desc: "1 mise à jour/semaine pendant 4 semaines",
      obtenu: false,
    },
    {
      id: "multi-activite",
      icon: "🗂️",
      nom: "Multi-activité",
      desc: "5 pages dans des catégories différentes",
      obtenu: false,
    },
    {
      id: "galerie-active",
      icon: "📸",
      nom: "Galerie active",
      desc: "Photos mises à jour sur plusieurs pages",
      obtenu: false,
    },
    {
      id: "focus-visibilite",
      icon: "🔍",
      nom: "Focus visibilité",
      desc: "Titres et descriptions optimisés SEO",
      obtenu: false,
    },
  ],

  /* -- Missions -- */
  /* statut: "todo" | "ongoing" | "done" */
  missions: [
    {
      titre: "Créer 1 nouvelle page cette semaine",
      desc:  "Publiez une nouvelle fiche pour un produit ou service de votre boulangerie.",
      pts:   40,
      statut:"done",
    },
    {
      titre: "Compléter tous les champs d'une page",
      desc:  "Remplissez chaque section : description, horaires, photos, localisation…",
      pts:   30,
      statut:"ongoing",
    },
    {
      titre: "Mettre à jour les photos de 2 pages",
      desc:  "Ajoutez au moins 2 nouvelles photos fraîches sur vos fiches existantes.",
      pts:   25,
      statut:"todo",
    },
    {
      titre: "Utiliser l'IA YOUPI pour rédiger une page",
      desc:  "Laissez l'IA générer le contenu de votre prochaine fiche en quelques secondes.",
      pts:   25,
      statut:"todo",
    },
  ],

  /* -- Panneau : pourquoi créer des pages -- */
  pourquoi: [
    {
      icon: "🔎",
      titre: "Google vous trouve plus vite",
      texte: "Chaque nouvelle page est une URL indexable. Plus vous en créez, plus Google vous référence.",
    },
    {
      icon: "🤖",
      titre: "Les IA citent vos infos",
      texte: "ChatGPT, Gemini et Perplexity s'appuient sur des données fraîches. Mettez à jour régulièrement pour être cité.",
    },
    {
      icon: "📈",
      titre: "Votre score de visibilité grimpe",
      texte: "L'algorithme YOUPI booste les profils actifs dans les résultats de l'annuaire.",
    },
  ],

  /* -- Prochaines étapes rapides -- */
  prochainesEtapes: [
    { icon: "✏️", texte: "Ajouter les horaires d'été",            pts: "+10 pts" },
    { icon: "📷", texte: "Mettre à jour les photos de la vitrine", pts: "+15 pts" },
    { icon: "🤖", texte: "Générer une page Viennoiseries avec l'IA", pts: "+25 pts" },
  ],
};


/* ==============================================
   UTILITAIRES
============================================== */

/** Affiche un toast de notification */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

/** Détermine le niveau actuel et le suivant */
function getNiveauInfo() {
  const pts   = DATA.pointsActuels;
  const niv   = DATA.niveaux;
  let current = niv[0], next = niv[1];
  for (let i = 0; i < niv.length; i++) {
    if (pts >= niv[i].ptMin) {
      current = niv[i];
      next    = niv[i + 1] || null;
    }
  }
  const ptsDansNiveau = pts - current.ptMin;
  const ptsNecessaires = next ? next.ptMin - current.ptMin : 1;
  const pct = next ? Math.round((ptsDansNiveau / ptsNecessaires) * 100) : 100;
  return { current, next, pct, pts };
}

/** Retourne le libellé CSS du statut mission */
function statusClass(s) {
  return s === 'done' ? 'done' : s === 'ongoing' ? 'ongoing' : 'todo';
}
function statusLabel(s) {
  return s === 'done' ? 'Terminée ✓' : s === 'ongoing' ? 'En cours…' : 'À faire';
}


/* ==============================================
   RENDU : BLOC PROFIL + STATS
============================================== */
function renderProfile() {
  const { current, next, pct, pts } = getNiveauInfo();
  const s = DATA.stats;

  return `
  <div class="card">
    <div class="profile-card">
      <div class="avatar">${DATA.client.initiales}</div>
      <div class="profile-info">
        <div class="profile-name">${DATA.client.nom}</div>
        <div class="level-badge">
          ⚡ Niveau ${current.numero} — ${current.nom}
        </div>
        <div class="progress-label">
          <span>${pts} pts</span>
          <span>${next ? `Prochain : ${next.nom} (${next.ptMin} pts)` : 'Niveau max atteint 🎉'}</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;text-align:right;">${pct} % accompli</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value">${s.pagesCreees}</div>
        <div class="stat-label">Pages créées</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${s.mAJCeMois}</div>
        <div class="stat-label">Mises à jour ce mois</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${s.badgesObtenus}</div>
        <div class="stat-label">Badges obtenus</div>
      </div>
    </div>
  </div>`;
}


/* ==============================================
   RENDU : GRILLE BADGES
============================================== */
function renderBadges() {
  const items = DATA.badges.map(b => `
    <div class="badge-item ${b.obtenu ? 'unlocked' : 'locked'}" title="${b.desc}">
      <span class="badge-icon">${b.icon}</span>
      <div class="badge-name">${b.nom}</div>
      <div class="badge-desc">${b.desc}</div>
      ${b.obtenu
        ? ''
        : '<div class="badge-lock">🔒 À débloquer</div>'}
    </div>`).join('');

  return `
  <div class="card section">
    <div class="card-title">🏅 Mes badges</div>
    <div class="divider"></div>
    <div class="badges-grid">${items}</div>
  </div>`;
}


/* ==============================================
   RENDU : MISSIONS
============================================== */
function renderMissions() {
  const items = DATA.missions.map(m => {
    const sc = statusClass(m.statut);
    return `
    <div class="mission-item">
      <div class="mission-status-dot status-${sc}"></div>
      <div class="mission-content">
        <div class="mission-title">${m.titre}</div>
        <div class="mission-desc">${m.desc}</div>
      </div>
      <div class="mission-right">
        <div class="mission-pts">+${m.pts} pts</div>
        <div class="mission-status-label label-${sc}">${statusLabel(m.statut)}</div>
        <button class="btn-launch"
          onclick="showToast('🚀 Mission « ${m.titre.substring(0, 30)}… » lancée dans YOUPI !')">
          Lancer dans YOUPI →
        </button>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="card section">
    <div class="card-title">🎯 Missions du moment</div>
    <div class="divider"></div>
    <div class="missions-list">${items}</div>
  </div>`;
}


/* ==============================================
   RENDU : PANNEAU LATÉRAL
============================================== */
function renderSidebar() {
  /* Bloc pédagogique */
  const whyItems = DATA.pourquoi.map(p => `
    <div class="why-item">
      <div class="why-icon">${p.icon}</div>
      <div class="why-text"><strong>${p.titre}</strong>${p.texte}</div>
    </div>`).join('');

  /* Prochaines étapes */
  const nextItems = DATA.prochainesEtapes.map(e => `
    <div class="next-step" onclick="showToast('✅ Action ajoutée à votre liste YOUPI !')">
      <div class="next-step-icon">${e.icon}</div>
      <div class="next-step-text">${e.texte}</div>
      <div class="next-step-pts">${e.pts}</div>
    </div>`).join('');

  return `
  <div class="card why-box">
    <div class="card-title">💡 Pourquoi créer des pages ?</div>
    <div class="divider"></div>
    ${whyItems}
  </div>

  <div class="card">
    <div class="card-title">⚡ Prochaines étapes rapides</div>
    <div class="divider"></div>
    <div class="next-steps-list">${nextItems}</div>
  </div>`;
}


/* ==============================================
   INITIALISATION : injection dans le DOM
============================================== */
function init() {
  document.getElementById('main-col').innerHTML =
    renderProfile() +
    renderBadges()  +
    renderMissions();

  document.getElementById('sidebar').innerHTML = renderSidebar();
}

/* Lancement au chargement */
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
