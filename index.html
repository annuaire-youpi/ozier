<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOTRANSNORD - Démo flotte camions</title>
  <!-- Intégration Make via webhook + Google Apps Script Web App JSON. [web:1][web:20] -->
  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --line:#e6ebf2;
      --text:#182230;
      --muted:#667085;
      --primary:#1769ff;
      --primary-2:#0f55d6;
      --success:#16a34a;
      --warning:#f59e0b;
      --danger:#dc2626;
      --info:#0ea5e9;
      --shadow:0 12px 30px rgba(15,23,42,.08);
      --radius:18px;
      --radius-sm:12px;
      --sidebar:280px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:linear-gradient(180deg,#f8fbff 0%,#f4f6fa 100%);
      color:var(--text);
    }

    button,input,select,textarea{
      font:inherit;
    }

    .app{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .hidden{display:none!important}
    .muted{color:var(--muted)}
    .danger{color:var(--danger)}
    .success{color:var(--success)}
    .warning{color:var(--warning)}
    .info{color:var(--info)}
    .nowrap{white-space:nowrap}

    .login-screen{
      min-height:100vh;
      display:grid;
      grid-template-columns:1.05fr .95fr;
      background:
        radial-gradient(circle at top left, rgba(23,105,255,.15), transparent 35%),
        radial-gradient(circle at bottom right, rgba(14,165,233,.12), transparent 35%),
        linear-gradient(180deg,#f8fbff,#f3f6fb);
    }

    .login-hero{
      padding:48px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:24px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .brand-logo{
      width:56px;height:56px;border-radius:16px;
      background:linear-gradient(135deg,var(--primary),#5da0ff);
      color:#fff;font-weight:800;font-size:22px;
      display:grid;place-items:center;
      box-shadow:var(--shadow);
    }

    .brand h1{
      margin:0;
      font-size:26px;
      line-height:1.1;
    }

    .hero-card{
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.8);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:28px;
      max-width:680px;
    }

    .hero-card h2{
      margin:0 0 12px;
      font-size:42px;
      line-height:1.05;
    }

    .hero-card p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.65;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }

    .hero-metric{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .hero-metric span{
      display:block;
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
    }

    .hero-metric strong{
      font-size:26px;
    }

    .login-panel{
      padding:28px;
      display:grid;
      place-items:center;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .login-card{
      width:min(100%,460px);
      padding:26px;
    }

    .login-card h3{
      margin:0 0 6px;
      font-size:28px;
    }

    .login-card p{
      margin:0 0 22px;
      color:var(--muted);
      line-height:1.55;
    }

    .switch{
      display:flex;
      background:#eef3fb;
      border-radius:14px;
      padding:4px;
      margin-bottom:18px;
      gap:4px;
    }

    .switch button{
      flex:1;
      border:none;
      background:transparent;
      padding:12px 14px;
      border-radius:10px;
      cursor:pointer;
      color:var(--muted);
      font-weight:600;
      transition:.2s ease;
    }

    .switch button.active{
      background:#fff;
      color:var(--text);
      box-shadow:0 4px 14px rgba(15,23,42,.08);
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:600;
    }

    .pin-wrap{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .pin-wrap input{
      flex:1;
      padding:16px 18px;
      border:1px solid var(--line);
      border-radius:14px;
      outline:none;
      font-size:26px;
      letter-spacing:8px;
      text-align:center;
      background:#fbfcff;
    }

    .kbd{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin:16px 0 8px;
    }

    .kbd button{
      border:none;
      background:#f7f9fd;
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      cursor:pointer;
      font-size:20px;
      font-weight:700;
      transition:.15s ease;
    }

    .kbd button:hover,
    .btn:hover,
    .icon-btn:hover{
      transform:translateY(-1px);
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:14px;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:13px 16px;
      cursor:pointer;
      transition:.15s ease;
      font-weight:700;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-2)}
    .btn-light{background:#eef3fb;color:var(--text)}
    .btn-danger{background:#fee2e2;color:#991b1b}
    .btn-success{background:#dcfce7;color:#166534}
    .btn-warning{background:#fef3c7;color:#92400e}
    .btn-block{width:100%}
    .btn-xs{padding:8px 10px;border-radius:10px;font-size:13px}
    .btn-sm{padding:10px 12px;border-radius:12px;font-size:14px}

    .demo-pins{
      margin-top:16px;
      background:#f8fbff;
      border:1px dashed #cfe0ff;
      border-radius:14px;
      padding:14px;
      color:var(--muted);
      line-height:1.55;
      font-size:14px;
    }

    .toast-wrap{
      position:fixed;
      top:16px;
      right:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      z-index:3000;
    }

    .toast{
      background:#111827;
      color:#fff;
      padding:12px 14px;
      border-radius:14px;
      box-shadow:var(--shadow);
      min-width:260px;
      max-width:360px;
      font-size:14px;
    }

    .workspace{
      display:grid;
      grid-template-columns:var(--sidebar) 1fr;
      min-height:100vh;
    }

    .sidebar{
      background:#0f172a;
      color:#e5ecf8;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:16px;
      position:sticky;
      top:0;
      height:100vh;
    }

    .sidebar .brand{
      align-items:flex-start;
    }

    .sidebar .brand-logo{
      width:48px;height:48px;font-size:20px;
    }

    .sidebar .brand h1{
      color:#fff;
      font-size:22px;
    }

    .sidebar small{
      color:#94a3b8;
    }

    .side-group{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .nav-btn{
      width:100%;
      text-align:left;
      border:none;
      padding:14px 15px;
      border-radius:14px;
      cursor:pointer;
      background:transparent;
      color:#d9e3f5;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-weight:600;
    }

    .nav-btn.active,
    .nav-btn:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
    }

    .sidebar-footer{
      margin-top:auto;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,.1);
      display:grid;
      gap:10px;
    }

    .main{
      min-width:0;
      padding:22px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .topbar h2{
      margin:0;
      font-size:28px;
    }

    .topbar p{
      margin:4px 0 0;
      color:var(--muted);
    }

    .topbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 12px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      color:var(--muted);
      font-size:13px;
      box-shadow:var(--shadow);
    }

    .section{
      display:none;
      flex-direction:column;
      gap:18px;
    }

    .section.active{display:flex}

    .grid-4{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
    }

    .grid-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:16px;
    }

    .metric{
      padding:18px;
      min-width:0;
    }

    .metric .label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
      display:flex;
      justify-content:space-between;
      gap:10px;
    }

    .metric .value{
      font-size:30px;
      font-weight:800;
      letter-spacing:-.02em;
    }

    .metric .sub{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
    }

    .panel{
      padding:18px;
    }

    .panel-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .panel-head h3{
      margin:0;
      font-size:18px;
    }

    .panel-head p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .toolbar input,
    .toolbar select,
    .form-grid input,
    .form-grid select,
    .form-grid textarea,
    .inline-form input,
    .inline-form select,
    .inline-form textarea{
      width:100%;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      outline:none;
    }

    .search{
      min-width:220px;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:860px;
      font-size:14px;
    }

    th,td{
      padding:13px 14px;
      border-bottom:1px solid #eef2f7;
      text-align:left;
      vertical-align:top;
    }

    th{
      background:#f8fbff;
      color:#475467;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.05em;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:#fafcff;
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .status.blue{background:#e0f2fe;color:#075985}
    .status.green{background:#dcfce7;color:#166534}
    .status.orange{background:#fef3c7;color:#92400e}
    .status.red{background:#fee2e2;color:#991b1b}
    .status.gray{background:#eef2f7;color:#475467}

    .progress{
      width:100%;
      height:10px;
      border-radius:999px;
      background:#edf2f7;
      overflow:hidden;
      margin-top:6px;
    }

    .progress > span{
      display:block;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,var(--primary),#59a0ff);
    }

    .list{
      display:grid;
      gap:12px;
    }

    .list-item{
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      background:#fff;
      display:flex;
      gap:12px;
      justify-content:space-between;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .list-item h4{
      margin:0 0 6px;
      font-size:16px;
    }

    .list-item p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .stack{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      background:#f3f6fb;
      color:#475467;
      font-size:12px;
      font-weight:600;
      border:1px solid var(--line);
    }

    .drawer{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.46);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:2500;
      padding:18px;
    }

    .drawer.open{display:flex}

    .modal{
      width:min(980px,100%);
      max-height:92vh;
      overflow:auto;
      background:#fff;
      border-radius:24px;
      box-shadow:0 24px 60px rgba(15,23,42,.25);
      border:1px solid var(--line);
    }

    .modal-sm{
      width:min(640px,100%);
    }

    .modal-head{
      padding:18px 18px 0;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .modal-head h3{
      margin:0;
      font-size:22px;
    }

    .modal-head p{
      margin:6px 0 0;
      color:var(--muted);
    }

    .modal-body{
      padding:18px;
    }

    .modal-foot{
      padding:0 18px 18px;
      display:flex;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }

    .icon-btn{
      border:none;
      cursor:pointer;
      background:#f3f6fb;
      width:42px;height:42px;
      border-radius:12px;
      font-size:18px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .form-grid .full{
      grid-column:1/-1;
    }

    .form-card{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      background:#fafcff;
    }

    .form-card h4{
      margin:0 0 12px;
      font-size:16px;
    }

    .inline-form{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    .sign-box{
      border:1px dashed #bfd2ff;
      border-radius:16px;
      background:#fbfdff;
      padding:12px;
    }

    #signaturePad{
      width:100%;
      height:200px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      touch-action:none;
      display:block;
    }

    .empty{
      padding:22px;
      text-align:center;
      color:var(--muted);
      border:1px dashed var(--line);
      border-radius:14px;
      background:#fbfcff;
    }

    .driver-shell{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      gap:18px;
      padding:18px;
    }

    .driver-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }

    .driver-cards{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:16px;
    }

    .mini-stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .sep{
      height:1px;
      background:var(--line);
      margin:8px 0;
    }

    .mobile-nav-toggle{
      display:none;
      border:none;
      width:44px;height:44px;
      border-radius:12px;
      background:#fff;
      box-shadow:var(--shadow);
      font-size:20px;
      cursor:pointer;
    }

    .sidebar-overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.42);
      z-index:1800;
    }

    .sidebar-overlay.open{display:block}

    @media (max-width:1100px){
      .grid-4{grid-template-columns:repeat(2,1fr)}
      .grid-3{grid-template-columns:1fr}
      .driver-cards{grid-template-columns:1fr}
      .hero-grid{grid-template-columns:1fr}
      .login-screen{grid-template-columns:1fr}
      .login-hero{display:none}
    }

    @media (max-width:920px){
      .workspace{
        grid-template-columns:1fr;
      }
      .sidebar{
        position:fixed;
        left:-100%;
        top:0;
        height:100vh;
        width:min(88vw,320px);
        z-index:2000;
        transition:left .22s ease;
      }
      .sidebar.open{left:0}
      .mobile-nav-toggle{display:inline-grid;place-items:center}
      .main{padding:16px}
      .grid-2,.form-grid,.inline-form,.mini-stats{grid-template-columns:1fr}
      .topbar h2{font-size:24px}
    }

    @media (max-width:640px){
      .grid-4{grid-template-columns:1fr}
      .actions{flex-direction:column}
      .pin-wrap input{font-size:22px;letter-spacing:6px}
      .login-card{padding:20px}
      .panel,.metric{padding:16px}
      .modal{border-radius:18px}
      .hero-card h2{font-size:34px}
    }
  </style>
</head>
<body>
  <div class="app">

        return JSON.parse(raw);
      } catch(e) {
        console.warn("Erreur parse integration", e);
        return null;
      }
    }

    function saveIntegrationConfig(cfg) {

        localStorage.setItem(STORAGE_KEY_INTEGRATION, JSON.stringify(cfg));
      } catch(e) {
        console.warn("Erreur save integration", e);
      }

    function calculateOrderRevenue(order){
      if(order.type==="journee") return Number(order.unitPrice||0);
      const doneTrips = state.trips.filter(t=>t.orderId===order.id && t.status==="done");
      const totalTonnage = doneTrips.reduce((s,t)=>s+Number(t.tonnage||order.estimatedTonnage||0),0);
      if(totalTonnage>0) return totalTonnage*Number(order.unitPrice||0);
      return Number(order.estimatedTrips||0)*Number(order.estimatedTonnage||0)*Number(order.unitPrice||0);
    }

    async function loadDataFromGasIfConfigured(){
      const cfg = loadIntegrationConfig();
      if(cfg){
        state.integration = { ...state.integration, ...cfg };
      }
      const syncBadge = $("#syncBadge");
      if(!state.integration.gasWebhook || state.integration.mode!=="gas"){
        if(syncBadge) syncBadge.textContent = "Sync locale active";
        return;
      }
      try{
        if(syncBadge) syncBadge.textContent="Chargement depuis Google Sheets...";
        const res = await fetch(state.integration.gasWebhook+"?action=all");
        if(!res.ok) throw new Error("HTTP "+res.status);
        const json = await res.json();
        if(!json.ok || !json.data) throw new Error("Réponse non valide");
        const data = json.data;
        const parseIntSafe = v=>v===""||v==null?null:Number(v);

        if(Array.isArray(data.drivers)){
          state.drivers = data.drivers.map(r=>({
            id:parseIntSafe(r.ID)||uid(state.drivers),
            fullName:r["Nom complet"]||r.fullName||"",
            birthDate:r["Date de naissance"]||r.birthDate||"",
            phone:r["Téléphone"]||r.phone||"",
            email:r["Email"]||r.email||"",
            license:r["Permis"]||r.license||"",
            pin:r["PIN"]||r.pin||""
          }));
        }
        if(Array.isArray(data.trucks)){
          state.trucks = data.trucks.map(r=>({
            id:parseIntSafe(r.ID)||uid(state.trucks),
            plate:r["Immatriculation"]||r.plate||"",
            mileage:parseIntSafe(r["Kilométrage"]||r["Kilométrage (km)"]||r.mileage)||0,
            type:r["Type"]||r.type||"",
            controlDate:r["Date contrôle technique"]||r.controlDate||"",
            driverId:parseIntSafe(r["ID Chauffeur"]||r.driverId)||null
          }));
        }
        if(Array.isArray(data.clients)){
          state.clients=data.clients.map(r=>({
            id:parseIntSafe(r.ID)||uid(state.clients),
            company:r["Nom entreprise"]||r.company||"",
            manager:r["Nom gérant"]||r.manager||"",
            phone:r["Téléphone"]||r.phone||"",
            email:r["Email"]||r.email||""
          }));
        }
        if(Array.isArray(data.materials)){
          state.materials=data.materials.map(r=>({
            id:parseIntSafe(r.ID)||uid(state.materials),
            name:r["Nom matériau"]||r.name||"",
            ratePerTon:Number(r["Tarif €/tonne"]||r.ratePerTon||0)
          }));
        }
        if(Array.isArray(data.rates)){
          state.rates=data.rates.map(r=>({
            id:parseIntSafe(r.ID)||uid(state.rates),
            label:r["Libellé"]||r.label||"",
            type:r["Type"]||r.type||"",
            amount:Number(r["Montant"]||r.amount||0),
            unit:r["Unité"]||r.unit||""
          }));
        }
        if(Array.isArray(data.expenseTypes)){
          state.expenseTypes=data.expenseTypes.map(r=>({
            id:parseIntSafe(r.ID)||uid(state.expenseTypes),
            label:r["Type de frais"]||r.label||""
          }));
        }
        if(Array.isArray(data.orders)){
          state.orders=data.orders.map(r=>({
            id:parseIntSafe(r.ID)||uid(state.orders),
            clientId:parseIntSafe(r["ID Client"]||r.clientId),
            address:r["Adresse chantier"]||r.address||"",
            estimatedTrips:Number(r["Nombre transports estimés"]||r.estimatedTrips||0),
            completedTrips:Number(r["Nombre transports réalisés"]||r.completedTrips||0),
            siteDate:r["Date chantier"]||r.siteDate||"",
            truckId:parseIntSafe(r["ID Camion"]||r.truckId),
            driverId:parseIntSafe(r["ID Chauffeur"]||r.driverId),
            type:r["Type commande"]||r.type||"materiaux",
            materialId:parseIntSafe(r["ID Matériau"]||r.materialId),
            unitPrice:Number(r["Prix unitaire (€)"]||r.unitPrice||0),
            estimatedTonnage:Number(r["Tonnage estimé"]||r.estimatedTonnage||0),
            notes:r["Notes"]||r.notes||"",
            status:r["Statut"]||r.status||"en_cours",
            billable:String(r["À facturer"]||r.billable||"").toLowerCase()==="true",
            createdAt:r["Date création"]||r.createdAt||todayStr()
          }));
        }
        if(Array.isArray(data.transports)){
          state.trips=data.transports.map(r=>({
            id:parseIntSafe(r.ID)||uid(state.trips),
            orderId:parseIntSafe(r["ID Commande"]||r.orderId),
            sequence:parseIntSafe(r["N° de transport"]||r.sequence)||1,
            driverId:parseIntSafe(r["ID Chauffeur"]||r.driverId),
            truckId:parseIntSafe(r["ID Camion"]||r.truckId),
            date:r["Date"]||r.date||todayStr(),
            status:r["Statut"]||r.status||"pending",
            tonnage:r["Tonnage réceptionné"]||r.tonnage||null,
            receiverName:r["Nom réceptionneur"]||r.receiverName||"",
            receiverRole:r["Statut réceptionneur"]||r.receiverRole||"",
            signed:String(r["Signé"]||r.signed||"").toLowerCase()==="true",
            signatureData:r["Signature"]||r.signatureData||""
          }));
        }
        if(Array.isArray(data.driverSheets)){
          state.daySheets=data.driverSheets.map(r=>({
            id:parseIntSafe(r.ID)||uid(state.daySheets),
            date:r["Date"]||r.date||todayStr(),
            driverId:parseIntSafe(r["ID Chauffeur"]||r.driverId),
            truckId:parseIntSafe(r["ID Camion"]||r.truckId),
            kilometers:Number(r["Kilométrage (km)"]||r.kilometers||0),
            fuelLiters:Number(r["Carburant (L)"]||r.fuelLiters||0),
            fuelAmount:Number(r["Montant carburant (€)"]||r.fuelAmount||0),
            sentAt:r["Envoyé à"]||r.sentAt||new Date().toISOString()
          }));
        }
        if(syncBadge) syncBadge.textContent="Données Sheets OK";
        showToast("Données chargées depuis Google Sheets.","success");
      }catch(err){
        console.error(err);
        if(syncBadge) syncBadge.textContent="Erreur de sync";
        showToast("Impossible de charger Google Sheets (mode démo).","error");
      }
    }

    // =========================
    // syncEvent -> Make / GAS
    // =========================
    function syncEvent(event, payload){
      const cfg = state.integration;
      const body = {
        event,
        source:"SOTRANSNORD",
        timestamp:new Date().toISOString(),
        payload
      };

      const syncBadge = $("#syncBadge");

      if(cfg.mode==="demo" || (!cfg.makeWebhook && !cfg.gasWebhook)){
        console.log("SYNC DEMO", body);
        if(syncBadge) syncBadge.textContent="Sync démo locale";
        return Promise.resolve({ok:true,mode:"demo"});
      }

      const headers={"Content-Type":"application/json"};
      if(cfg.apiKey) headers["x-api-key"]=cfg.apiKey;

      let url="";
      if(cfg.mode==="make") url=cfg.makeWebhook;
      if(cfg.mode==="gas") url=cfg.gasWebhook;
      if(!url){
        showToast("Aucun endpoint configuré.","error");
        return Promise.resolve({ok:false});
      }

      if(syncBadge) syncBadge.textContent=cfg.mode==="make"?"Sync Make en cours...":"Sync Google Apps Script en cours...";

      return fetch(url,{
        method:"POST",
        headers,
        body:JSON.stringify(body)
      })
      .then(async res=>{
        if(syncBadge) syncBadge.textContent=cfg.mode==="make"?"Sync Make active":"Sync Google Apps Script active";
        showToast(`Événement "${event}" envoyé.`,"success");
        return {ok:res.ok,status:res.status,text:await res.text().catch(()=> "")};
      })
      .catch(err=>{
        console.error(err);
        if(syncBadge) syncBadge.textContent="Erreur de sync";
        showToast("Échec d’envoi vers l’endpoint.","error");
        return {ok:false,error:String(err)};
      });
    }

    // =========================
    // Bind des événements principaux
    // =========================
    function bindEvents(){
      const roleManagerBtn = document.getElementById("roleManagerBtn");
      const roleDriverBtn = document.getElementById("roleDriverBtn");
      const pinInput = document.getElementById("pinInput");
      const enterBtn = document.getElementById("enterBtn");
      const clearBtn = document.getElementById("clearBtn");
      const kbd = document.getElementById("kbd");

      if(kbd){
        const digits = ["1","2","3","4","5","6","7","8","9","←","0","✔"];
        kbd.innerHTML = digits.map(d=>`<button type="button" data-key="${d}">${d}</button>`).join("");
        kbd.addEventListener("click",e=>{
          const btn=e.target.closest("button");
          if(!btn) return;
          const key = btn.dataset.key;
          if(key==="←"){
            pinInput.value=pinInput.value.slice(0,-1);
            return;
          }
          if(key==="✔"){
            handleLogin();
            return;
          }
          if(pinInput.value.length<6) pinInput.value+=key;
        });
      }

      if(roleManagerBtn && roleDriverBtn){
        roleManagerBtn.addEventListener("click",()=>{
          state.auth.role="manager";
          roleManagerBtn.classList.add("active");
          roleDriverBtn.classList.remove("active");
        });
        roleDriverBtn.addEventListener("click",()=>{
          state.auth.role="driver";
          roleDriverBtn.classList.add("active");
          roleManagerBtn.classList.remove("active");
        });
      }

      function handleLogin(){
        const pin = (pinInput.value||"").trim();
        if(state.auth.role==="manager"){
          if(pin===state.users.managerPin){
            state.auth.currentUser={id:"manager",name:"Gabriel OZIER"};
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("managerApp").classList.remove("hidden");
            renderAll();
          }else{
            showToast("PIN gérant incorrect.","error");
          }
        }else{
          const driverId = state.users.driverPins[pin];
          const driver = state.drivers.find(d=>d.id===driverId);
          if(driver){
            state.auth.currentUser={id:driver.id,name:driver.fullName};
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("driverApp").classList.remove("hidden");
            renderAll();
          }else{
            showToast("PIN chauffeur incorrect.","error");
          }
        }
      }

      if(enterBtn) enterBtn.addEventListener("click",handleLogin);
      if(clearBtn) clearBtn.addEventListener("click",()=>pinInput.value="");

      const logoutManagerBtn = document.getElementById("logoutManagerBtn");
      const logoutDriverBtn = document.getElementById("logoutDriverBtn");
      if(logoutManagerBtn) logoutManagerBtn.addEventListener("click",()=>{
        state.auth.currentUser=null;
        document.getElementById("managerApp").classList.add("hidden");
        document.getElementById("driverApp").classList.add("hidden");
        document.getElementById("loginScreen").classList.remove("hidden");
      });
      if(logoutDriverBtn) logoutDriverBtn.addEventListener("click",()=>{
        state.auth.currentUser=null;
        document.getElementById("managerApp").classList.add("hidden");
        document.getElementById("driverApp").classList.add("hidden");
        document.getElementById("loginScreen").classList.remove("hidden");
      });

      const saveIntegrationBtn = document.getElementById("saveIntegrationBtn");
      const testIntegrationBtn = document.getElementById("testIntegrationBtn");

      if(saveIntegrationBtn){
        saveIntegrationBtn.addEventListener("click",()=>{
          const cfg = {
            makeWebhook: ($("#makeWebhookInput")?.value||"").trim(),
            gasWebhook: ($("#gasWebhookInput")?.value||"").trim(),
            apiKey: ($("#apiKeyInput")?.value||"").trim(),
            mode: ($("#syncModeInput")?.value||"demo")
          };
          state.integration={...state.integration,...cfg};
          saveIntegrationConfig(cfg);
          renderIntegrationFields();
          showToast("Configuration d’intégration enregistrée.","success");
        });
      }

      if(testIntegrationBtn){
        testIntegrationBtn.addEventListener("click",()=>{
          const cfg = {
            makeWebhook: ($("#makeWebhookInput")?.value||"").trim(),
            gasWebhook: ($("#gasWebhookInput")?.value||"").trim(),
            apiKey: ($("#apiKeyInput")?.value||"").trim(),
            mode: ($("#syncModeInput")?.value||"demo")
          };
          state.integration={...state.integration,...cfg};
          saveIntegrationConfig(cfg);
          syncEvent("notification.test",{
            subject:"Test SOTRANSNORD",
            message:"Notification envoyée depuis l’onglet Intégrations."
          });
        });
      }

      // TODO : ici, tu remets tous tes autres listeners (nav-btn, addOrderBtn,
      // modals, signature, driver day sheet, etc.) tels quels.
    }
