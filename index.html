<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SOTRANSNORD</title>
<style>
:root{--bg:#0b1020;--panel:#11182c;--panel2:#151f38;--line:rgba(255,255,255,.08);--text:#eaf0ff;--muted:#9aa7c7;--primary:#6c8cff;--primary2:#4dd6c5;--danger:#ff6b81;--warn:#ffcc66;--ok:#37d67a;--shadow:0 16px 40px rgba(0,0,0,.35);--r:18px}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,#17254a 0,#0b1020 52%,#060913 100%);color:var(--text)}
button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}a{color:inherit;text-decoration:none}
.hidden{display:none !important}.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--line);backdrop-filter:blur(12px);background:rgba(8,12,24,.65);position:sticky;top:0;z-index:30}
.brand{display:flex;align-items:center;gap:14px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 10px 30px rgba(108,140,255,.35);display:grid;place-items:center;font-weight:800}.brand h1{margin:0;font-size:18px;letter-spacing:.5px}.brand p{margin:0;color:var(--muted);font-size:12px}
.top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.pill,.btn,.input,.select,.textarea{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);border-radius:14px}.pill{padding:10px 12px;display:inline-flex;align-items:center;gap:8px;font-size:13px}.btn{padding:11px 14px;transition:.2s ease;box-shadow:none}.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}.btn.primary{background:linear-gradient(135deg,var(--primary),#86a1ff)}.btn.ghost{background:rgba(255,255,255,.03)}.btn.danger{background:rgba(255,107,129,.12);border-color:rgba(255,107,129,.25)}
.shell{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 72px)}
.sidebar{border-right:1px solid var(--line);background:rgba(8,12,24,.4);padding:18px;position:sticky;top:72px;height:calc(100vh - 72px);overflow:auto}.nav-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin:18px 0 10px}.nav-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 14px;margin-bottom:8px;border-radius:14px;border:1px solid transparent;background:transparent;color:var(--text);text-align:left;transition:.2s}.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.06);border-color:var(--line)}
.main{padding:20px;overflow:auto}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.card{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}.kpi{display:flex;justify-content:space-between;align-items:flex-start}.kpi h3{margin:0 0 8px;font-size:13px;color:var(--muted);font-weight:600}.kpi .v{font-size:28px;font-weight:800}.kpi .d{font-size:12px;color:var(--muted)}.tag{padding:6px 10px;border-radius:999px;font-size:12px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
.section{margin-top:18px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.section-head h2{margin:0;font-size:18px}.section-head p{margin:0;color:var(--muted);font-size:13px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.table-wrap,.panel{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:920px}.table th,.table td{padding:14px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}.table th{color:var(--muted);font-weight:600;text-align:left;background:rgba(255,255,255,.02)}.row-actions{display:flex;gap:8px;flex-wrap:wrap}.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px}.chip.ok{background:rgba(55,214,122,.12);color:#8ef0b0}.chip.warn{background:rgba(255,204,102,.12);color:#ffd980}.chip.info{background:rgba(108,140,255,.12);color:#b9c8ff}.chip.danger{background:rgba(255,107,129,.12);color:#ff9aad}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.field{display:flex;flex-direction:column;gap:8px}.field label{font-size:12px;color:var(--muted)}.input,.select,.textarea{width:100%;padding:12px 14px;outline:none}.textarea{min-height:110px;resize:vertical}.modal-backdrop{position:fixed;inset:0;background:rgba(2,6,15,.72);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal{width:min(980px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,#151c33,#101829);border:1px solid var(--line);border-radius:22px;box-shadow:0 30px 80px rgba(0,0,0,.5)}.modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-body{padding:20px}.modal-foot{padding:18px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}.login{min-height:100vh;display:grid;place-items:center;padding:20px}.login-box{width:min(1100px,100%);display:grid;grid-template-columns:1.1fr .9fr;gap:18px}.hero,.auth{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.hero{padding:34px;display:flex;flex-direction:column;justify-content:space-between;min-height:620px}.hero h2{font-size:48px;line-height:1.02;margin:0 0 14px}.hero p{color:var(--muted);max-width:640px;font-size:16px;line-height:1.7}.feature-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:auto}.feature{padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line)}.auth{padding:30px}.pin{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:16px 0 12px}.pin input{height:60px;text-align:center;font-size:22px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(108,140,255,.12);color:#bfd0ff;font-size:12px;border:1px solid rgba(108,140,255,.25)}
.mobile-menu{display:none}
@media (max-width:1100px){.shell{grid-template-columns:1fr}.sidebar{position:fixed;left:-320px;top:72px;width:290px;transition:.25s;z-index:40}.sidebar.open{left:0}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.login-box{grid-template-columns:1fr}.hero h2{font-size:36px}}
@media (max-width:720px){.topbar{padding:0 14px}.mobile-menu{display:inline-flex}.main{padding:14px}.cards,.form-grid,.feature-grid{grid-template-columns:1fr}.table{min-width:780px}.hero{padding:22px;min-height:auto}.auth{padding:20px}.pin input{height:52px;font-size:20px}}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
const MODE = "demo";
const APP = {state:{auth:false,role:null,view:'dashboard',sidebar:false,pin:'',edit:null,modal:null,toast:'',filter:'all'},config:{makeWebhook:'https://hook.make.com/XXXX'},utils:{uuid(){return 'id_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36)},money(v){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(v||0)},num(v){return new Intl.NumberFormat('fr-FR').format(v||0)},date(v){return new Date(v).toLocaleDateString('fr-FR')},monthKey(d){const x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')},today(){return new Date().toISOString().slice(0,10)},clone(o){return JSON.parse(JSON.stringify(o))}},data:null};
const mockData={chauffeurs:[{id:'c1',nom:'Mikaël Robert',dob:'1988-04-12',tel:'0696 12 34 11',email:'mikael@sotransnord.fr',permis:'C/EC',docs:'OK'},{id:'c2',nom:'Yannick Louis',dob:'1991-09-03',tel:'0696 45 88 21',email:'yannick@sotransnord.fr',permis:'C',docs:'OK'},{id:'c3',nom:'Jules Fontaine',dob:'1985-01-19',tel:'0696 77 20 44',email:'jules@sotransnord.fr',permis:'C/EC',docs:'En attente'}],camions:[{id:'t1',immat:'AB-123-CD',km:124500,type:'Benne 8x4',ct:'2026-11-15',docs:'OK'},{id:'t2',immat:'EF-456-GH',km:98200,type:'Benne 6x4',ct:'2026-07-02',docs:'OK'},{id:'t3',immat:'IJ-789-KL',km:151200,type:'Toupie',ct:'2026-05-28',docs:'À renouveler'}],clients:[{id:'cl1',entreprise:'Carib Constructions',gerant:'Stéphane Hégésippe',tel:'0596 11 22 33',email:'contact@carib-constructions.fr'},{id:'cl2',entreprise:'BTP Nord Caraïbes',gerant:'Nadine Lurel',tel:'0596 44 55 66',email:'commande@btpnord.fr'},{id:'cl3',entreprise:'Sorebat Martinique',gerant:'Olivier Marcel',tel:'0596 77 88 99',email:'admin@sorebat.fr'}],materiaux:[{id:'m1',nom:'Sable 0/4',unite:'tonne'},{id:'m2',nom:'Gravier 6/10',unite:'tonne'},{id:'m3',nom:'Tout-venant',unite:'tonne'},{id:'m4',nom:'Béton prêt à l’emploi',unite:'m3'}],tarifs:[{id:'ta1',materiau:'Sable 0/4',tonne:28,jour:260},{id:'ta2',materiau:'Gravier 6/10',tonne:31,jour:275},{id:'ta3',materiau:'Tout-venant',tonne:25,jour:240},{id:'ta4',materiau:'Béton prêt à l’emploi',tonne:0,jour:420}],frais:[{id:'f1',type:'carburant',montant:1840,mois:'2026-05'},{id:'f2',type:'vidange',montant:320,mois:'2026-05'},{id:'f3',type:'réparations',montant:890,mois:'2026-04'},{id:'f4',type:'assurance',montant:1240,mois:'2026-05'},{id:'f5',type:'pneus',montant:760,mois:'2026-03'}],commandes:[{id:'co1',clientId:'cl1',chauffeurId:'c1',camionId:'t1',type:'matériaux',materiau:'Sable 0/4',tonnes:18,date:'2026-05-02',statut:'terminé',facture:false,recep:'Chantier Bellefontaine',fonction:'Chef de chantier',signature:'OK'},{id:'co2',clientId:'cl2',chauffeurId:'c2',camionId:'t2',type:'journée',materiau:'',tonnes:0,date:'2026-05-05',statut:'en cours',facture:false,recep:'Dépôt Trinité',fonction:'Magasinier',signature:''},{id:'co3',clientId:'cl3',chauffeurId:'c1',camionId:'t3',type:'matériaux',materiau:'Gravier 6/10',tonnes:12,date:'2026-05-05',statut:'en cours',facture:false,recep:'Route du François',fonction:'Conducteur travaux',signature:''},{id:'co4',clientId:'cl1',chauffeurId:'c3',camionId:'t1',type:'journée',materiau:'',tonnes:0,date:'2026-04-21',statut:'terminé',facture:true,recep:'Zone industrielle',fonction:'Responsable site',signature:'OK'}],transports:[{id:'tr1',commandeId:'co1',estime:18,realise:17.6,kilometrage:42,carburant:38,date:'2026-05-02'},{id:'tr2',commandeId:'co4',estime:8,realise:8.2,kilometrage:27,carburant:25,date:'2026-04-21'}],margins:[{mois:'2025-06',ca:14800,frais:10100},{mois:'2025-07',ca:16500,frais:10900},{mois:'2025-08',ca:15650,frais:10020},{mois:'2025-09',ca:17220,frais:11180},{mois:'2025-10',ca:18900,frais:12140},{mois:'2025-11',ca:17500,frais:11600},{mois:'2025-12',ca:19300,frais:12480},{mois:'2026-01',ca:18200,frais:11740},{mois:'2026-02',ca:17650,frais:11220},{mois:'2026-03',ca:19800,frais:12900},{mois:'2026-04',ca:20500,frais:13240},{mois:'2026-05',ca:21450,frais:13670}]};
const DataService={async init(){APP.data=APP.clone(mockData);return APP.data},async api(action,entity,payload){if(MODE==='production'){const res=await fetch(APP.config.makeWebhook,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,entity,payload,mode:MODE,timestamp:new Date().toISOString()})});return res.json().catch(()=>({ok:true}))}return this.local(action,entity,payload)},async local(action,entity,payload){const db=APP.data; const list=()=>db[entity]; const findIndex=id=>list().findIndex(x=>x.id===id); if(action==='list')return APP.clone(list()); if(action==='get')return APP.clone(list().find(x=>x.id===payload.id)||null); if(action==='create'){const row={id:APP.utils.uuid(),...payload}; list().unshift(row); return APP.clone(row)} if(action==='update'){const i=findIndex(payload.id); if(i>-1){db[entity][i]={...db[entity][i],...payload.data}; return APP.clone(db[entity][i])}} if(action==='delete'){const i=findIndex(payload.id); if(i>-1)return db[entity].splice(i,1)} return null},drivers:{list(){return DataService.api('list','chauffeurs')},save(d){return DataService.api(d.id?'update':'create','chauffeurs',d.id?{id:d.id,data:d}:{...d})},remove(id){return DataService.api('delete','chauffeurs',{id})}},trucks:{list(){return DataService.api('list','camions')},save(d){return DataService.api(d.id?'update':'create','camions',d.id?{id:d.id,data:d}:{...d})},remove(id){return DataService.api('delete','camions',{id})}},clients:{list(){return DataService.api('list','clients')},save(d){return DataService.api(d.id?'update':'create','clients',d.id?{id:d.id,data:d}:{...d})},remove(id){return DataService.api('delete','clients',{id})}},materials:{list(){return DataService.api('list','materiaux')},save(d){return DataService.api(d.id?'update':'create','materiaux',d.id?{id:d.id,data:d}:{...d})},remove(id){return DataService.api('delete','materiaux',{id})}},rates:{list(){return DataService.api('list','tarifs')},save(d){return DataService.api(d.id?'update':'create','tarifs',d.id?{id:d.id,data:d}:{...d})},remove(id){return DataService.api('delete','tarifs',{id})}},fees:{list(){return DataService.api('list','frais')},save(d){return DataService.api(d.id?'update':'create','frais',d.id?{id:d.id,data:d}:{...d})},remove(id){return DataService.api('delete','frais',{id})}},orders:{list(){return DataService.api('list','commandes')},save(d){return DataService.api(d.id?'update':'create','commandes',d.id?{id:d.id,data:d}:{...d})},remove(id){return DataService.api('delete','commandes',{id})}},transports:{list(){return DataService.api('list','transports')},save(d){return DataService.api(d.id?'update':'create','transports',d.id?{id:d.id,data:d}:{...d})},remove(id){return DataService.api('delete','transports',{id})}}};
const UI={mount(){document.getElementById('app').innerHTML=APP.state.auth?this.shell():this.login(); this.bind()},login(){return <div class="login"><div class="login-box"><div class="hero"><div><span class="badge">SOTRANSNORD • Transport BTP</span><h2>Un pilotage SaaS pour le gérant et le chauffeur.</h2><p>Gestion complète des chauffeurs, camions, clients, commandes, frais, marge et transports du jour, avec une architecture prête pour Google Sheets et Make en mode production.</p></div><div class="feature-grid"><div class="feature"><strong>Double interface</strong><div class="d">Gérant et chauffeur avec vues dédiées.</div></div><div class="feature"><strong>Mode hybride</strong><div class="d">Démo locale ou API webhook Make.</div></div><div class="feature"><strong>ERP léger</strong><div class="d">CRUD, suivi, KPI, facturation et marge.</div></div><div class="feature"><strong>Responsive</strong><div class="d">Optimisé mobile et desktop.</div></div></div></div><div class="auth"><h3 style="margin:0 0 8px">Connexion sécurisée</h3><p style="margin:0;color:var(--muted)">Entrez votre PIN 6 chiffres puis choisissez votre rôle.</p><div class="field" style="margin-top:18px"><label>Rôle</label><select id="role" class="select"><option value="gerant">Gérant</option><option value="chauffeur">Chauffeur</option></select></div><div class="pin">${Array.from({length:6},(_,i)=><input inputmode="numeric" maxlength="1" data-pin="${i}" />).join('')}</div><button class="btn primary" id="loginBtn" style="width:100%">Accéder</button><div class="card" style="margin-top:16px"><div class="tag">Demo PIN: 123456</div><div style="margin-top:10px;color:var(--muted);font-size:13px">Le mode production route toutes les opérations vers Make via webhook JSON.</div></div></div></div></div>},shell(){return <div class="topbar"><div class="brand"><button class="btn ghost mobile-menu" id="toggleSide">☰</button><div class="logo">SN</div><div><h1>SOTRANSNORD</h1><p>${APP.state.role==='gerant'?'Interface Gérant':'Interface Chauffeur'} • ${MODE.toUpperCase()}</p></div></div><div class="top-actions"><span class="pill">${APP.state.role==='gerant'?'Gérant':'Chauffeur'}</span><span class="pill">${MODE==='demo'?'Démo locale':'Production Make'}</span><button class="btn ghost" id="refreshBtn">Rafraîchir</button><button class="btn danger" id="logoutBtn">Déconnexion</button></div></div><div class="shell"><aside class="sidebar ${APP.state.sidebar?'open':''}"><div class="nav-title">Navigation</div>${APP.state.role==='gerant'?this.navGerant():this.navChauffeur()}</aside><main class="main">${APP.state.role==='gerant'?this.viewGerant():this.viewChauffeur()}</main></div>${this.modal()}<div id="toast" class="modal-backdrop" style="pointer-events:none;display:${APP.state.toast?'flex':'none'}"><div class="card">${APP.state.toast}</div></div>},navGerant(){const items=[['dashboard','Dashboard'],['chauffeurs','Chauffeurs'],['camions','Camions'],['clients','Clients'],['materiaux','Matériaux'],['tarifs','Tarifs'],['frais','Frais'],['commandes','Commandes'],['suivi','Suivi'],['facturation','Facturation'],['rapports','Rapports'],['marge','Marge']]; return items.map(([k,l])=><button class="nav-item ${APP.state.view===k?'active':''}" data-view="${k}"><span>${l}</span><span>›</span></button>).join('')},navChauffeur(){return [['jour','Transports du jour'],['fin','Fin de journée']].map(([k,l])=><button class="nav-item ${APP.state.view===k?'active':''}" data-view="${k}"><span>${l}</span><span>›</span></button>).join('')},kpis(){const c=APP.data.commandes, done=c.filter(x=>x.statut==='terminé').length, ing=c.filter(x=>x.statut==='en cours').length, fact=c.filter(x=>x.facture).length, ca=APP.data.margins.at(-1).ca; return <div class="grid cards"><div class="card kpi"><div><h3>Chiffre d’affaires</h3><div class="v">${APP.utils.money(ca)}</div><div class="d">Dernier mois</div></div><span class="tag">+8.2%</span></div><div class="card kpi"><div><h3>Transports terminés</h3><div class="v">${done}</div><div class="d">Total enregistrés</div></div><span class="tag">OK</span></div><div class="card kpi"><div><h3>En cours</h3><div class="v">${ing}</div><div class="d">À piloter aujourd’hui</div></div><span class="tag">Suivi</span></div><div class="card kpi"><div><h3>À facturer</h3><div class="v">${c.filter(x=>!x.facture).length}</div><div class="d">Commandes ouvertes</div></div><span class="tag">${fact}</span></div></div>},viewGerant(){const v=APP.state.view; if(v==='dashboard')return ${this.kpis()}${this.panelQuick()}; if(['chauffeurs','camions','clients','materiaux','tarifs','frais'].includes(v))return this.crudView(v); if(v==='commandes')return this.ordersView(); if(v==='suivi')return this.suiviView(); if(v==='facturation')return this.facturationView(); if(v==='rapports')return this.rapportsView(); if(v==='marge')return this.margeView(); return this.kpis()},panelQuick(){return <div class="section"><div class="section-head"><div><h2>Vue d’ensemble</h2><p>Performance, opérations et alertes en temps réel.</p></div><div class="toolbar"><button class="btn primary" data-open="commande">Nouvelle commande</button><button class="btn ghost" data-open="chauffeur">Ajouter chauffeur</button></div></div><div class="grid" style="grid-template-columns:1.2fr .8fr"><div class="card">${this.timeline()}</div><div class="card">${this.alertBox()}</div></div></div>},timeline(){return <div style="display:grid;gap:10px">${APP.data.commandes.slice(0,4).map(o=>{const cl=APP.data.clients.find(x=>x.id===o.clientId)||{}; return <div class="pill" style="justify-content:space-between"><span>${cl.entreprise||'Client'} - ${o.type} - ${o.materiau||'Journée'}</span><span>${o.statut}</span></div>}).join('')}</div>},alertBox(){const exp=APP.data.camions.filter(t=>new Date(t.ct)<new Date('2026-06-01')); return <div><div class="badge">Alertes maintenance</div><div style="margin-top:12px;display:grid;gap:10px">${exp.map(t=><div class="card" style="padding:12px"><strong>${t.immat}</strong><div style="color:var(--muted);font-size:13px">CT: ${t.ct} - ${t.type}</div></div>).join('')||'<div style="color:var(--muted)">Aucune alerte critique.</div>'}</div></div>},crudView(entity){const map={chauffeurs:'Chauffeurs',camions:'Camions',clients:'Clients',materiaux:'Matériaux',tarifs:'Tarifs',frais:'Frais'}; const list=APP.data[entity]; return <div class="section"><div class="section-head"><div><h2>${map[entity]}</h2><p>CRUD complet synchronisé par DataService.</p></div><div class="toolbar"><button class="btn primary" data-open="${entity.slice(0,-1)}">Nouveau</button></div></div><div class="table-wrap"><table class="table"><thead><tr>${Object.keys(list[0]||{}).filter(k=>k!=='id').map(k=><th>${k}</th>).join('')}<th>Actions</th></tr></thead><tbody>${list.map(r=><tr>${Object.entries(r).filter(([k])=>k!=='id').map(([k,v])=><td>${v}</td>).join('')}<td><div class="row-actions"><button class="btn ghost" data-edit="${entity}:${r.id}">Éditer</button><button class="btn danger" data-del="${entity}:${r.id}">Supprimer</button></div></td></tr>).join('')}</tbody></table></div></div>},ordersView(){return <div class="section"><div class="section-head"><div><h2>Commandes</h2><p>Création de commandes, affectations et facturation.</p></div><div class="toolbar"><button class="btn primary" data-open="commande">Nouvelle commande</button></div></div>${this.orderCards()}<div class="table-wrap" style="margin-top:12px"><table class="table"><thead><tr><th>Date</th><th>Client</th><th>Chauffeur</th><th>Camion</th><th>Type</th><th>Tonnage</th><th>Statut</th><th>Facture</th><th>Actions</th></tr></thead><tbody>${APP.data.commandes.map(o=>this.orderRow(o)).join('')}</tbody></table></div></div>},orderCards(){return <div class="grid cards" style="margin-top:12px"><div class="card"><div class="tag">Matériaux</div><div class="v" style="margin-top:8px">${APP.data.commandes.filter(x=>x.type==='matériaux').length}</div></div><div class="card"><div class="tag">Journée</div><div class="v" style="margin-top:8px">${APP.data.commandes.filter(x=>x.type==='journée').length}</div></div><div class="card"><div class="tag">Terminées</div><div class="v" style="margin-top:8px">${APP.data.commandes.filter(x=>x.statut==='terminé').length}</div></div><div class="card"><div class="tag">À facturer</div><div class="v" style="margin-top:8px">${APP.data.commandes.filter(x=>!x.facture).length}</div></div></div>},orderRow(o){const cl=APP.data.clients.find(x=>x.id===o.clientId)||{}, ch=APP.data.chauffeurs.find(x=>x.id===o.chauffeurId)||{}, tr=APP.data.camions.find(x=>x.id===o.camionId)||{}; return <tr><td>${o.date}</td><td>${cl.entreprise||''}</td><td>${ch.nom||''}</td><td>${tr.immat||''}</td><td>${o.type}</td><td>${o.tonnes||'-'}</td><td><span class="chip ${o.statut==='terminé'?'ok':'warn'}">${o.statut}</span></td><td><span class="chip ${o.facture?'ok':'danger'}">${o.facture?'Facturée':'À facturer'}</span></td><td><div class="row-actions"><button class="btn ghost" data-edit="commandes:${o.id}">Éditer</button><button class="btn primary" data-bill="${o.id}">À facturer</button></div></td></tr>},suiviView(){return <div class="section"><div class="section-head"><div><h2>Suivi</h2><p>Comparaison des estimés et réalisés.</p></div></div><div class="table-wrap"><table class="table"><thead><tr><th>Commande</th><th>Estimé t</th><th>Réalisé t</th><th>Km</th><th>Carburant</th><th>Écart</th></tr></thead><tbody>${APP.data.transports.map(t=>{const o=APP.data.commandes.find(x=>x.id===t.commandeId)||{}; return <tr><td>${o.date||''}</td><td>${t.estime}</td><td>${t.realise}</td><td>${t.kilometrage}</td><td>${t.carburant}</td><td>${(t.realise-t.estime).toFixed(1)}</td></tr>}).join('')}</tbody></table></div></div>},facturationView(){return <div class="section"><div class="section-head"><div><h2>Facturation</h2><p>Basculer les commandes à facturer.</p></div></div><div class="table-wrap"><table class="table"><thead><tr><th>Client</th><th>Date</th><th>Montant estimé</th><th>État</th></tr></thead><tbody>${APP.data.commandes.map(o=>{const cl=APP.data.clients.find(x=>x.id===o.clientId)||{}; const rate=APP.data.tarifs.find(x=>x.materiau===o.materiau); const amt=o.type==='matériaux'?(o.tonnes||0)*(rate?.tonne||0):(rate?.jour||350); return <tr><td>${cl.entreprise||''}</td><td>${o.date}</td><td>${APP.utils.money(amt)}</td><td>${o.facture?'Facturée':'À facturer'}</td></tr>}).join('')}</tbody></table></div></div>},rapportsView(){const fuel=APP.data.frais.filter(f=>f.type==='carburant').reduce((a,b)=>a+b.montant,0); const monthly=APP.data.frais.reduce((a,b)=>(a[b.mois]=(a[b.mois]||0)+b.montant,a),{}); return <div class="section"><div class="section-head"><div><h2>Rapports</h2><p>Consommation carburant et frais mensuels.</p></div></div><div class="grid cards"><div class="card"><h3 style="margin-top:0;color:var(--muted)">Carburant</h3><div class="v">${APP.utils.money(fuel)}</div></div><div class="card"><h3 style="margin-top:0;color:var(--muted)">Total frais</h3><div class="v">${APP.utils.money(APP.data.frais.reduce((a,b)=>a+b.montant,0))}</div></div></div><div class="table-wrap" style="margin-top:12px"><table class="table"><thead><tr><th>Mois</th><th>Montant frais</th></tr></thead><tbody>${Object.entries(monthly).sort().map(([m,v])=><tr><td>${m}</td><td>${APP.utils.money(v)}</td></tr>).join('')}</tbody></table></div></div>},margeView(){return <div class="section"><div class="section-head"><div><h2>Marge 12 mois</h2><p>Calcul automatique de la marge mensuelle.</p></div></div><div class="table-wrap"><table class="table"><thead><tr><th>Mois</th><th>CA</th><th>Frais</th><th>Marge</th></tr></thead><tbody>${APP.data.margins.map(m=><tr><td>${m.mois}</td><td>${APP.utils.money(m.ca)}</td><td>${APP.utils.money(m.frais)}</td><td>${APP.utils.money(m.ca-m.frais)}</td></tr>).join('')}</tbody></table></div></div>},viewChauffeur(){const mine=APP.data.commandes.filter(o=>o.chauffeurId==='c1'&&o.date===APP.utils.today()); return <div class="section"><div class="section-head"><div><h2>Transports du jour</h2><p>Liste dynamique des missions assignées.</p></div></div><div class="grid" style="grid-template-columns:1.1fr .9fr"><div class="panel" style="padding:14px">${mine.map(o=>this.driverCard(o)).join('')||'<div style="padding:18px;color:var(--muted)">Aucun transport aujourd’hui.</div>'}</div><div class="panel" style="padding:16px"><h3 style="margin-top:0">Fin de journée</h3><div class="form-grid"><div class="field"><label>Kilométrage</label><input class="input" id="eokm" type="number" placeholder="ex. 25840"></div><div class="field"><label>Carburant</label><input class="input" id="eofuel" type="number" placeholder="ex. 42"></div></div><button class="btn primary" style="margin-top:12px;width:100%" id="endDay">Valider la journée</button></div></div>},driverCard(o){const cl=APP.data.clients.find(x=>x.id===o.clientId)||{}; return <div class="card" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start"><div><strong>${cl.entreprise||'Client'}</strong><div style="color:var(--muted);font-size:13px">${o.type} • ${o.materiau||'Journée'} • ${o.date}</div></div><button class="btn ghost" data-transport="${o.id}">Ouvrir</button></div></div>},modal(){const m=APP.state.modal; if(!m)return ''; return <div class="modal-backdrop" style="display:flex"><div class="modal"><div class="modal-head"><strong>${m.title}</strong><button class="btn ghost" data-close="1">✕</button></div><div class="modal-body">${m.body}</div><div class="modal-foot">${m.foot||'<button class="btn ghost" data-close="1">Fermer</button>'}</div></div></div>},bind(){document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{APP.state.view=b.dataset.view; UI.mount()}); const t=document.getElementById('toggleSide'); if(t)t.onclick=()=>{APP.state.sidebar=!APP.state.sidebar; UI.mount()}; const r=document.getElementById('refreshBtn'); if(r)r.onclick=async()=>{await DataService.init(); UI.toast('Données rafraîchies'); UI.mount()}; const l=document.getElementById('logoutBtn'); if(l)l.onclick=()=>{APP.state.auth=false;APP.state.role=null;APP.state.view='dashboard';UI.mount()}; document.querySelectorAll('.pin input').forEach((i,idx)=>i.oninput=e=>{i.value=e.target.value.replace(/\D/g,'').slice(0,1); if(i.value&&idx<5)i.nextElementSibling.focus();}); const login=document.getElementById('loginBtn'); if(login)login.onclick=()=>{const pin=[...document.querySelectorAll('[data-pin]')].map(x=>x.value).join(''); if(pin==='123456'){APP.state.auth=true;APP.state.role=document.getElementById('role').value;APP.state.view=APP.state.role==='gerant'?'dashboard':'jour';UI.mount()} else UI.toast('PIN invalide')}; document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>{APP.state.modal=null;UI.mount()}); document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>UI.openForm(b.dataset.open)); document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>UI.openEdit(b.dataset.edit)); document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>UI.removeRow(b.dataset.del)); document.querySelectorAll('[data-bill]').forEach(b=>b.onclick=()=>UI.bill(b.dataset.bill)); document.querySelectorAll('[data-transport]').forEach(b=>b.onclick=()=>UI.openTransport(b.dataset.transport)); const ed=document.getElementById('endDay'); if(ed)ed.onclick=()=>UI.toast('Journée enregistrée'); },toast(msg){APP.state.toast=msg; setTimeout(()=>{APP.state.toast=''; UI.mount()},1600)},openForm(kind){const map={chauffeur:{title:'Nouveau chauffeur',fields:['nom','dob','tel','email','permis','docs']},camion:{title:'Nouveau camion',fields:['immat','km','type','ct','docs']},client:{title:'Nouveau client',fields:['entreprise','gerant','tel','email']},materiau:{title:'Nouveau matériau',fields:['nom','unite']},tarif:{title:'Nouveau tarif',fields:['materiau','tonne','jour']},frai:{title:'Nouveau frais',fields:['type','montant','mois']},commande:{title:'Nouvelle commande',fields:['clientId','chauffeurId','camionId','type','materiau','tonnes','date','statut','facture','recep','fonction','signature']}}[kind]; APP.state.modal={title:map.title,body:this.formHtml(kind,map.fields),foot:'<button class="btn ghost" data-close="1">Annuler</button><button class="btn primary" id="saveForm">Enregistrer</button>'}; UI.mount(); document.getElementById('saveForm').onclick=()=>this.saveForm(kind)},openEdit(ref){const [entity,id]=ref.split(':'); const item=APP.data[entity].find(x=>x.id===id); APP.state.modal={title:'Édition',body:this.formHtml(entity.slice(0,-1),Object.keys(item).filter(k=>k!=='id'),item),foot:'<button class="btn ghost" data-close="1">Annuler</button><button class="btn primary" id="saveForm">Mettre à jour</button>'}; UI.mount(); document.getElementById('saveForm').onclick=()=>this.saveForm(entity.slice(0,-1),id)},formHtml(kind,fields,item={}){return <div class="form-grid">${fields.map(f=><div class="field"><label>${f}</label><input class="input" data-f="${f}" value="${item[f]??''}" /></div>).join('')}</div>},async saveForm(kind,id){const modal=document.querySelector('.modal-body'); const data={}; modal.querySelectorAll('[data-f]').forEach(i=>data[i.dataset.f]=i.value); const entity={chauffeur:'chauffeurs',camion:'camions',client:'clients',materiau:'materiaux',tarif:'tarifs',frai:'frais',commande:'commandes'}[kind]; if(id)data.id=id; await DataService[entity==='chauffeurs'?'drivers':entity==='camions'?'trucks':entity==='clients'?'clients':entity==='materiaux'?'materials':entity==='tarifs'?'rates':entity==='frais'?'fees':'orders'].save(data); APP.state.modal=null; UI.mount()},async removeRow(ref){const [entity,id]=ref.split(':'); await DataService[entity==='chauffeurs'?'drivers':entity==='camions'?'trucks':entity==='clients'?'clients':entity==='materiaux'?'materials':entity==='tarifs'?'rates':entity==='frais'?'fees':'orders'].remove(id); UI.mount()},bill(id){const o=APP.data.commandes.find(x=>x.id===id); if(o){o.facture=true; DataService.orders.save(o).then(()=>{UI.toast('Marqué à facturer'); UI.mount()})}},openTransport(id){const o=APP.data.commandes.find(x=>x.id===id); APP.state.modal={title:'Transport',body:<div class="form-grid"><div class="field"><label>Tonnage</label><input class="input" id="tonn" value="${o.tonnes||''}"></div><div class="field"><label>Réceptionnaire</label><input class="input" id="rec" value="${o.recep||''}"></div><div class="field"><label>Fonction</label><input class="input" id="fonc" value="${o.fonction||''}"></div><div class="field"><label>Signature</label><input class="input" id="sig" placeholder="Signature simulée"></div></div>,foot:'<button class="btn ghost" data-close="1">Fermer</button><button class="btn primary" id="saveTransport">Valider</button>'}; UI.mount(); document.getElementById('saveTransport').onclick=()=>{UI.toast('Transport validé'); APP.state.modal=null; UI.mount()}}};
(async()=>{await DataService.init(); UI.mount();})();
</script>
