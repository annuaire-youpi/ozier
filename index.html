<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOTRANSNORD</title>
  <style>
    :root{--bg:#f4f6f8;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--accent:#d97706;--accent2:#111827;--success:#16a34a;--warn:#f59e0b;--danger:#dc2626;--shadow:0 10px 30px rgba(17,24,39,.08);--radius:18px}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .shell{width:100%;max-width:1320px}
    .hidden{display:none !important}
    .login{max-width:420px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:28px}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    .logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#fbbf24);display:grid;place-items:center;color:#fff;font-weight:800}
    h1,h2,h3,p{margin:0} .title{font-size:30px;line-height:1.1;margin-bottom:8px}.sub{color:var(--muted);margin-bottom:18px}
    .input,.select,.btn,textarea{width:100%;border-radius:14px;border:1px solid var(--line);padding:14px 16px;font-size:15px;background:#fff;color:var(--text)}
    .grid{display:grid;gap:16px}.grid.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}.grid.main{grid-template-columns:1.4fr .9fr;align-items:start}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card .pad{padding:18px}.card h3{font-size:16px;margin-bottom:14px}
    .header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
    .header .left{display:flex;align-items:center;gap:14px}.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#fff7ed;color:#9a3412;font-size:12px;font-weight:700}
    .nav{display:flex;gap:10px;flex-wrap:wrap;padding:14px 20px;border-bottom:1px solid var(--line)}
    .nav button,.btn{cursor:pointer;border:none;font-weight:700}.nav button{padding:10px 14px;border-radius:999px;background:#eef2f7;color:var(--accent2)}.nav button.active{background:var(--accent2);color:#fff}
    .btn.primary{background:var(--accent);color:#fff}.btn.secondary{background:#eef2f7}.btn.success{background:var(--success);color:#fff}.btn.danger{background:var(--danger);color:#fff}
    .content{padding:20px}.kpi{padding:18px}.kpi .label{font-size:13px;color:var(--muted)}.kpi .value{font-size:30px;font-weight:800;margin-top:8px}.kpi .hint{font-size:12px;color:var(--muted);margin-top:4px}
    table{width:100%;border-collapse:collapse} th,td{text-align:left;padding:12px 10px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top} th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
    .status{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;display:inline-flex}.s-pending{background:#fff7ed;color:#9a3412}.s-progress{background:#eff6ff;color:#1d4ed8}.s-done{background:#ecfdf5;color:#047857}.s-cancel{background:#fef2f2;color:#b91c1c}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#fff;cursor:pointer}.tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
    form{display:grid;gap:12px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .mini{font-size:12px;color:var(--muted)} .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:12px}
    .toast{position:fixed;right:18px;bottom:18px;background:#111827;color:#fff;padding:12px 14px;border-radius:12px;box-shadow:var(--shadow);opacity:0;transform:translateY(10px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}
    @media (max-width: 980px){.grid.kpis,.grid.main,.row2,.row3{grid-template-columns:1fr}.content{padding:14px}.header{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<div class="app">
  <div class="shell" id="shell"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const MODE = "demo"; // "demo" ou "production"
const WEBHOOKS = {
  chauffeurs: "https://hook.make.com/XXXXX",
  commandes: "https://hook.make.com/XXXXX",
  transports: "https://hook.make.com/XXXXX"
};

const mockData = {
  chauffeurs: [
    {id:"CH-001",nom:"Mickaël Dorval",telephone:"0696 10 22 33",categorie:"C",statut:"Disponible",camionId:"TR-001"},
    {id:"CH-002",nom:"Nicolas Baptiste",telephone:"0696 33 44 55",categorie:"C",statut:"En mission",camionId:"TR-002"},
    {id:"CH-003",nom:"Jean-Pierre Louis",telephone:"0696 77 88 99",categorie:"C",statut:"Repos",camionId:""}
  ],
  camions: [
    {id:"TR-001",immatriculation:"FL-482-ZD",marque:"Volvo",modele:"FMX 370",capaciteTonnes:"14",statut:"Disponible"},
    {id:"TR-002",immatriculation:"FL-915-KP",marque:"Iveco",modele:"Trakker",capaciteTonnes:"18",statut:"En mission"},
    {id:"TR-003",immatriculation:"FL-203-JM",marque:"Renault",modele:"K 480",capaciteTonnes:"16",statut:"Maintenance"}
  ],
  clients: [
    {id:"CL-001",nom:"Carrières du Nord",telephone:"0696 20 11 20",site:"Trinité"},
    {id:"CL-002",nom:"BTP Martinique",telephone:"0696 34 45 56",site:"Lamentin"},
    {id:"CL-003",nom:"Rivière Matériaux",telephone:"0696 78 12 90",site:"Schoelcher"}
  ],
  commandes: [
    {id:"CMD-001",date:"2026-05-05",clientId:"CL-001",materiau:"Sable",quantite:"12",siteLivraison:"Trinité",statut:"En attente"},
    {id:"CMD-002",date:"2026-05-05",clientId:"CL-002",materiau:"Gravier 0/31.5",quantite:"18",siteLivraison:"Lamentin",statut:"Planifiée"},
    {id:"CMD-003",date:"2026-05-04",clientId:"CL-003",materiau:"Terre végétale",quantite:"8",siteLivraison:"Schoelcher",statut:"Livrée"}
  ],
  transports: [
    {id:"T-001",commandeId:"CMD-001",chauffeurId:"CH-002",camionId:"TR-002",date:"2026-05-05",statut:"En cours",tonnage:"12",receptionnaire:"",heureDepart:"07:20",heureFin:""},
    {id:"T-002",commandeId:"CMD-002",chauffeurId:"CH-001",camionId:"TR-001",date:"2026-05-05",statut:"En attente",tonnage:"",receptionnaire:"",heureDepart:"",heureFin:""},
    {id:"T-003",commandeId:"CMD-003",chauffeurId:"CH-003",camionId:"TR-003",date:"2026-05-04",statut:"Terminé",tonnage:"8",receptionnaire:"Chantier Nord",heureDepart:"08:10",heureFin:"12:40"}
  ]
};

const DataService = {
  _data: JSON.parse(JSON.stringify(mockData)),
  async getChauffeurs(){ return MODE==="demo" ? this._data.chauffeurs : fetch(WEBHOOKS.chauffeurs,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"getChauffeurs"})}).then(r=>r.json()); },
  async addChauffeur(data){ return MODE==="demo" ? (this._data.chauffeurs.unshift(data), data) : fetch(WEBHOOKS.chauffeurs,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"addChauffeur",data})}).then(r=>r.json()); },
  async updateChauffeur(id,data){ return MODE==="demo" ? (Object.assign(this._data.chauffeurs.find(x=>x.id===id)||{}, data), data) : fetch(WEBHOOKS.chauffeurs,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"updateChauffeur",id,data})}).then(r=>r.json()); },
  async deleteChauffeur(id){ return MODE==="demo" ? (this._data.chauffeurs=this._data.chauffeurs.filter(x=>x.id!==id), true) : fetch(WEBHOOKS.chauffeurs,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"deleteChauffeur",id})}).then(r=>r.json()); },
  async getCommandes(){ return MODE==="demo" ? this._data.commandes : fetch(WEBHOOKS.commandes,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"getCommandes"})}).then(r=>r.json()); },
  async addCommande(data){ return MODE==="demo" ? (this._data.commandes.unshift(data), data) : fetch(WEBHOOKS.commandes,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"addCommande",data})}).then(r=>r.json()); },
  async updateCommande(id,data){ return MODE==="demo" ? (Object.assign(this._data.commandes.find(x=>x.id===id)||{}, data), data) : fetch(WEBHOOKS.commandes,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"updateCommande",id,data})}).then(r=>r.json()); },
  async getTransports(){ return MODE==="demo" ? this._data.transports : fetch(WEBHOOKS.transports,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"getTransports"})}).then(r=>r.json()); },
  async updateTransport(id,data){ return MODE==="demo" ? (Object.assign(this._data.transports.find(x=>x.id===id)||{}, data), data) : fetch(WEBHOOKS.transports,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"updateTransport",id,data})}).then(r=>r.json()); },
  async getCamions(){ return this._data.camions; },
  async getClients(){ return this._data.clients; }
};

const state = { logged:false, tab:"dashboard", chauffeurs:[], commandes:[], transports:[], camions:[], clients:[] };
const PIN = "123456";
const shell = document.getElementById('shell');
const toast = (m)=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)};
const statusClass = s => ({"En attente":"s-pending","Planifiée":"s-progress","En cours":"s-progress","Terminé":"s-done","Livrée":"s-done","Annulé":"s-cancel"}[s]||'s-pending');
const byId = (arr,id)=>arr.find(x=>x.id===id)?.nom || arr.find(x=>x.id===id)?.immatriculation || id || "-";

async function loadData(){ state.chauffeurs = await DataService.getChauffeurs(); state.commandes = await DataService.getCommandes(); state.transports = await DataService.getTransports(); state.camions = await DataService.getCamions(); state.clients = await DataService.getClients(); }

function loginView(){ shell.innerHTML = `
  <div class="login">
    <div class="brand"><div class="logo">SN</div><div><h2>SOTRANSNORD</h2><div class="mini">Gestion transport matériaux</div></div></div>
    <div class="title">Connexion</div><p class="sub">Saisissez le PIN à 6 chiffres pour accéder au dashboard.</p>
    <input class="input" id="pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••••" />
    <div style="height:12px"></div>
    <button class="btn primary" id="enter">Accéder</button>
    <div style="height:12px"></div><div class="mini">PIN démo : 123456</div>
  </div>`;
  document.getElementById('enter').onclick = ()=>{ if(document.getElementById('pin').value===PIN){ state.logged=true; init(); } else toast('PIN incorrect'); };
}

function nav(){ return `<div class="nav"><button class="${state.tab==='dashboard'?'active':''}" data-tab="dashboard">Dashboard</button><button class="${state.tab==='commandes'?'active':''}" data-tab="commandes">Commandes</button><button class="${state.tab==='chauffeurs'?'active':''}" data-tab="chauffeurs">Chauffeurs</button><button class="${state.tab==='transports'?'active':''}" data-tab="transports">Transports</button></div>`; }

function dashboardView(){
  const enCours = state.transports.filter(t=>t.statut==='En cours').length;
  const attente = state.commandes.filter(c=>c.statut==='En attente').length;
  const dispo = state.chauffeurs.filter(c=>c.statut==='Disponible').length;
  const rows = state.commandes.map(c=>`<tr><td>${c.id}</td><td>${c.date}</td><td>${byId(state.clients,c.clientId)}</td><td>${c.materiau}</td><td>${c.quantite} t</td><td><span class="status ${statusClass(c.statut)}">${c.statut}</span></td></tr>`).join('');
  shell.innerHTML = `
    <div class="card"><div class="header"><div class="left"><div class="brand" style="margin:0"><div class="logo">SN</div><div><h2>SOTRANSNORD</h2><div class="mini">${MODE==='demo'?'Mode démo':'Mode production'}</div></div></div></div><div class="badge">BTP • Matériaux • Transport</div></div>${nav()}</div>
    <div class="content grid kpis">
      <div class="card kpi"><div class="label">Commandes du jour</div><div class="value">${state.commandes.length}</div><div class="hint">Gestion simple des demandes</div></div>
      <div class="card kpi"><div class="label">Transports en cours</div><div class="value">${enCours}</div><div class="hint">Suivi chauffeur</div></div>
      <div class="card kpi"><div class="label">En attente</div><div class="value">${attente}</div><div class="hint">À planifier</div></div>
      <div class="card kpi"><div class="label">Chauffeurs disponibles</div><div class="value">${dispo}</div><div class="hint">Prêts à partir</div></div>
    </div>
    <div class="content grid main">
      <div class="card"><div class="pad"><div class="toolbar"><h3>Commandes récentes</h3></div><table><thead><tr><th>ID</th><th>Date</th><th>Client</th><th>Matériau</th><th>Qté</th><th>Statut</th></tr></thead><tbody>${rows}</tbody></table></div></div>
      <div class="card"><div class="pad"><h3>Raccourcis</h3><div class="grid"><button class="btn primary" id="goCmd">Ajouter une commande</button><button class="btn secondary" id="goCh">Ajouter un chauffeur</button><button class="btn secondary" id="goTr">Voir transports du jour</button></div><div style="height:18px"></div><div class="mini">Structure des données compatible Google Sheets : une ligne = un enregistrement, colonnes explicites, statuts simples.</div></div></div>
    </div>`;
  bindNav(); document.getElementById('goCmd').onclick=()=>{state.tab='commandes';render()}; document.getElementById('goCh').onclick=()=>{state.tab='chauffeurs';render()}; document.getElementById('goTr').onclick=()=>{state.tab='transports';render()};
}

function commandesView(){
  const rows = state.commandes.map(c=>`<tr><td>${c.id}</td><td>${c.date}</td><td>${byId(state.clients,c.clientId)}</td><td>${c.materiau}</td><td>${c.quantite}</td><td>${c.siteLivraison}</td><td><span class="status ${statusClass(c.statut)}">${c.statut}</span></td></tr>`).join('');
  shell.innerHTML = `<div class="card"><div class="header"><div class="left"><div class="brand" style="margin:0"><div class="logo">SN</div><div><h2>SOTRANSNORD</h2><div class="mini">Gestion des commandes</div></div></div></div>${nav()}</div><div class="content grid main"><div class="card"><div class="pad"><h3>Liste des commandes</h3><table><thead><tr><th>ID</th><th>Date</th><th>Client</th><th>Matériau</th><th>Qté</th><th>Livraison</th><th>Statut</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="card"><div class="pad"><h3>Nouvelle commande</h3><form id="cmdForm"><div class="row2"><input class="input" name="date" type="date" required><select class="select" name="clientId">${state.clients.map(c=>`<option value="${c.id}">${c.nom}</option>`).join('')}</select></div><div class="row2"><input class="input" name="materiau" placeholder="Matériau" required><input class="input" name="quantite" type="number" placeholder="Quantité en tonnes" required></div><div class="row2"><input class="input" name="siteLivraison" placeholder="Site de livraison" required><select class="select" name="statut"><option>En attente</option><option>Planifiée</option><option>Livrée</option></select></div><button class="btn primary" type="submit">Ajouter</button></form></div></div></div>`;
  bindNav(); document.getElementById('cmdForm').onsubmit = async e=>{e.preventDefault(); const f=new FormData(e.target); await DataService.addCommande({id:'CMD-'+String(Date.now()).slice(-3),date:f.get('date'),clientId:f.get('clientId'),materiau:f.get('materiau'),quantite:f.get('quantite'),siteLivraison:f.get('siteLivraison'),statut:f.get('statut')}); await loadData(); toast('Commande ajoutée'); render();};
}

function chauffeursView(){
  const rows = state.chauffeurs.map(c=>`<tr><td>${c.id}</td><td>${c.nom}</td><td>${c.telephone}</td><td>${c.categorie}</td><td>${c.statut}</td><td>${byId(state.camions,c.camionId)}</td></tr>`).join('');
  shell.innerHTML = `<div class="card"><div class="header"><div class="left"><div class="brand" style="margin:0"><div class="logo">SN</div><div><h2>SOTRANSNORD</h2><div class="mini">Gestion des chauffeurs</div></div></div></div>${nav()}</div><div class="content grid main"><div class="card"><div class="pad"><h3>Liste des chauffeurs</h3><table><thead><tr><th>ID</th><th>Nom</th><th>Téléphone</th><th>Cat.</th><th>Statut</th><th>Camion</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="card"><div class="pad"><h3>Ajouter un chauffeur</h3><form id="chForm"><div class="row2"><input class="input" name="nom" placeholder="Nom complet" required><input class="input" name="telephone" placeholder="Téléphone" required></div><div class="row2"><input class="input" name="categorie" value="C"><select class="select" name="statut"><option>Disponible</option><option>En mission</option><option>Repos</option></select></div><button class="btn primary" type="submit">Ajouter</button></form></div></div></div>`;
  bindNav(); document.getElementById('chForm').onsubmit = async e=>{e.preventDefault(); const f=new FormData(e.target); await DataService.addChauffeur({id:'CH-'+String(Date.now()).slice(-3),nom:f.get('nom'),telephone:f.get('telephone'),categorie:f.get('categorie'),statut:f.get('statut'),camionId:''}); await loadData(); toast('Chauffeur ajouté'); render();};
}

function transportsView(){
  const rows = state.transports.map(t=>`<tr><td>${t.id}</td><td>${byId(state.commandes,t.commandeId)}</td><td>${byId(state.chauffeurs,t.chauffeurId)}</td><td>${byId(state.camions,t.camionId)}</td><td>${t.date}</td><td><span class="status ${statusClass(t.statut)}">${t.statut}</span></td><td>${t.tonnage||'-'}</td><td>${t.receptionnaire||'-'}</td><td><button class="btn success" data-finish="${t.id}">Terminer</button></td></tr>`).join('');
  shell.innerHTML = `<div class="card"><div class="header"><div class="left"><div class="brand" style="margin:0"><div class="logo">SN</div><div><h2>SOTRANSNORD</h2><div class="mini">Bloc chauffeur simplifié</div></div></div></div>${nav()}</div><div class="content grid main"><div class="card"><div class="pad"><h3>Transports du jour</h3><table><thead><tr><th>ID</th><th>Commande</th><th>Chauffeur</th><th>Camion</th><th>Date</th><th>Statut</th><th>Tonnage</th><th>Réceptionnaire</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="card"><div class="pad"><h3>Fiche fin de journée</h3><form id="trkForm"><div class="row2"><select class="select" name="transportId">${state.transports.map(t=>`<option value="${t.id}">${t.id} - ${byId(state.chauffeurs,t.chauffeurId)}</option>`).join('')}</select><select class="select" name="statut"><option>En cours</option><option>Terminé</option></select></div><div class="row2"><input class="input" name="tonnage" type="number" placeholder="Tonnage effectué"><input class="input" name="receptionnaire" placeholder="Nom du réceptionnaire"></div><button class="btn primary" type="submit">Enregistrer</button></form></div></div></div>`;
  bindNav(); document.querySelectorAll('[data-finish]').forEach(b=>b.onclick=async()=>{const id=b.dataset.finish; await DataService.updateTransport(id,{statut:'Terminé',heureFin:new Date().toTimeString().slice(0,5)}); await loadData(); toast('Transport terminé'); render();}); document.getElementById('trkForm').onsubmit = async e=>{e.preventDefault(); const f=new FormData(e.target); await DataService.updateTransport(f.get('transportId'),{tonnage:f.get('tonnage'),receptionnaire:f.get('receptionnaire'),statut:f.get('statut')}); await loadData(); toast('Fiche enregistrée'); render();};
}

function bindNav(){ document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()}); }
function render(){ if(!state.logged){loginView(); return;} if(state.tab==='dashboard') dashboardView(); else if(state.tab==='commandes') commandesView(); else if(state.tab==='chauffeurs') chauffeursView(); else transportsView(); }
async function init(){ await loadData(); render(); }
init();
</script>
</body>
</html>
